name: Release Windows Build

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build Windows release
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup npm
        run: npm install -g npm@11.6.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Prepare bundled Sherpa CUDA runtime
        shell: pwsh
        run: |
          $version = "v1.13.2"
          $runtime = "sherpa-onnx-v1.13.2-cuda-12.x-cudnn-9.x-win-x64-cuda"
          $archive = "$runtime.tar.bz2"
          $url = "https://github.com/k2-fsa/sherpa-onnx/releases/download/$version/$archive"
          $destination = "src-tauri/resources/engines/sherpa/$version"
          New-Item -ItemType Directory -Path $destination -Force | Out-Null
          Invoke-WebRequest -Uri $url -OutFile $archive
          tar -xf $archive -C $destination
          Remove-Item -LiteralPath (Join-Path $destination $runtime "include") -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath (Join-Path $destination $runtime "lib") -Recurse -Force -ErrorAction SilentlyContinue
          Get-ChildItem -LiteralPath (Join-Path $destination $runtime "bin") | Select-Object Name,Length

      - name: Build Tauri app
        run: npm run tauri -- build

      - name: Collect release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist-release -Force | Out-Null
          Copy-Item -Path "src-tauri/target/release/bundle/nsis/*.exe" -Destination dist-release
          Copy-Item -Path "src-tauri/target/release/bundle/msi/*.msi" -Destination dist-release
          Get-ChildItem dist-release

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist-release/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "dist-release/*"
          generate_release_notes: true
