name: Release CPU Build

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build Windows CPU release
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Tauri app
        run: npm run tauri -- build

      - name: Collect release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist-release -Force | Out-Null
          Copy-Item -Path "src-tauri/target/release/bundle/nsis/*.exe" -Destination dist-release
          Copy-Item -Path "src-tauri/target/release/bundle/msi/*.msi" -Destination dist-release
          Get-ChildItem dist-release

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist-release/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "dist-release/*"
          generate_release_notes: true
