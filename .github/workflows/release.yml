name: Release Windows CPU Build

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build Windows CPU release
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify release version
        shell: pwsh
        run: |
          $tagVersion = $env:GITHUB_REF_NAME -replace '^v', ''
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $tauriVersion = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          $cargoVersion = (Select-String -Path src-tauri/Cargo.toml -Pattern '^version\s*=\s*"([^"]+)"$').Matches[0].Groups[1].Value
          if ($tagVersion -ne $packageVersion -or $tagVersion -ne $tauriVersion -or $tagVersion -ne $cargoVersion) {
            throw "Release version mismatch: tag=$tagVersion package=$packageVersion tauri=$tauriVersion cargo=$cargoVersion"
          }

      - name: Scan tracked source for embedded secrets
        shell: pwsh
        run: |
          $files = git ls-files | Where-Object { $_ -match '\.(rs|ts|tsx|js|json|md|yml|yaml|ps1|toml)$' }
          $patterns = @(
            'AIza[0-9A-Za-z_-]{20,}',
            'sk-[0-9A-Za-z]{20,}',
            'gh[pousr]_[0-9A-Za-z]{20,}',
            'Bearer\s+[0-9A-Za-z._-]{20,}',
            '-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----',
            'AKIA[0-9A-Z]{16}'
          )
          $matches = Select-String -LiteralPath $files -Pattern $patterns -CaseSensitive:$false -ErrorAction SilentlyContinue
          if ($matches) {
            $matches | Format-Table Path, LineNumber, Line -AutoSize
            throw "Potential embedded secret detected."
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup npm
        run: npm install -g npm@11.6.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test


      - name: Prepare FFmpeg runtime
        shell: pwsh
        run: |
          $url = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          $archive = Join-Path $env:RUNNER_TEMP "ffmpeg-release-essentials.zip"
          $extractDir = Join-Path $env:RUNNER_TEMP "ffmpeg-release-essentials"
          $targetDir = "src-tauri/resources/engines/ffmpeg/bin"

          Invoke-WebRequest -Uri $url -OutFile $archive
          Expand-Archive -Path $archive -DestinationPath $extractDir -Force
          $ffmpeg = Get-ChildItem -Path $extractDir -Filter ffmpeg.exe -Recurse | Select-Object -First 1
          if (-not $ffmpeg) { throw "ffmpeg.exe was not found in the downloaded FFmpeg package." }
          $sourceBin = $ffmpeg.Directory.FullName
          if (-not (Test-Path (Join-Path $sourceBin "ffprobe.exe"))) { throw "ffprobe.exe was not found next to ffmpeg.exe." }

          New-Item -ItemType Directory -Path $targetDir -Force | Out-Null
          Copy-Item -LiteralPath (Join-Path $sourceBin "ffmpeg.exe") -Destination (Join-Path $targetDir "ffmpeg.exe") -Force
          Copy-Item -LiteralPath (Join-Path $sourceBin "ffprobe.exe") -Destination (Join-Path $targetDir "ffprobe.exe") -Force
          & (Join-Path $targetDir "ffmpeg.exe") -version
          Get-ChildItem $targetDir

      - name: Prepare llama.cpp CPU runtime
        shell: pwsh
        run: ./scripts/prepare-llama-runtime.ps1

      - name: Prepare minimal Sherpa-ONNX CPU runtime
        shell: pwsh
        run: ./scripts/prepare-sherpa-runtime.ps1

      - name: Verify bundled resources
        shell: pwsh
        run: ./scripts/check-bundled-resources.ps1

      - name: Run Rust tests
        run: cargo test --release --manifest-path src-tauri/Cargo.toml

      - name: Build Tauri app
        run: npm run tauri -- build

      - name: Collect release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist-release -Force | Out-Null
          Copy-Item -Path "src-tauri/target/release/bundle/nsis/*.exe" -Destination dist-release
          Copy-Item -Path "src-tauri/target/release/bundle/msi/*.msi" -Destination dist-release
          Get-ChildItem dist-release

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist-release/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "dist-release/*"
          generate_release_notes: true
