<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">Hi-Voicer 1.0.2 current interface overview</title>
  <desc id="desc">A dark Hi-Voicer desktop interface overview showing audio processing tabs, waveform clipping, multi-segment selections, queue history, and local transcription tools.</desc>
  <defs>
    <linearGradient id="app-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1b22"/>
      <stop offset="1" stop-color="#102a33"/>
    </linearGradient>
    <linearGradient id="primary" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="20" stdDeviation="26" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <clipPath id="wave-clip">
      <rect x="0" y="0" width="760" height="170" rx="8"/>
    </clipPath>
  </defs>

  <rect width="1440" height="820" fill="#07161c"/>
  <g transform="translate(70 52)" filter="url(#shadow)">
    <rect width="1300" height="716" rx="18" fill="url(#app-bg)" stroke="#254653"/>

    <g>
      <rect width="1300" height="62" rx="18" fill="#0e242c"/>
      <rect y="44" width="1300" height="18" fill="#0e242c"/>
      <circle cx="28" cy="31" r="7" fill="#ef4444"/>
      <circle cx="52" cy="31" r="7" fill="#f59e0b"/>
      <circle cx="76" cy="31" r="7" fill="#22c55e"/>
      <text x="108" y="39" fill="#ecfeff" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="21" font-weight="800">Hi-Voicer</text>
      <text x="230" y="38" fill="#9fd6e5" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="14">本地离线语音工作台</text>
    </g>

    <g transform="translate(24 88)" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif">
      <g>
        <rect width="238" height="566" rx="12" fill="#0b1d24" stroke="#24434f"/>
        <text x="24" y="38" fill="#e0f2fe" font-size="16" font-weight="800">工作区</text>
        <g font-size="14" font-weight="700">
          <rect x="16" y="62" width="206" height="42" rx="8" fill="#14303a"/>
          <text x="52" y="88" fill="#e0f2fe">语音输入</text>
          <text x="52" y="138" fill="#9fd6e5">文件转录</text>
          <text x="52" y="188" fill="#9fd6e5">字幕校对</text>
          <rect x="16" y="214" width="206" height="42" rx="8" fill="#083c3a" stroke="#20d6c7"/>
          <text x="52" y="240" fill="#ecfeff">音频处理</text>
          <text x="52" y="290" fill="#9fd6e5">术语替换</text>
          <text x="52" y="340" fill="#9fd6e5">诊断</text>
        </g>
        <g fill="none" stroke="#6ee7d8" stroke-width="2" stroke-linecap="round">
          <path d="M30 83h12m-6-6v12"/>
          <path d="M30 233c4-10 8 10 12 0s8 10 12 0"/>
        </g>
        <rect x="16" y="442" width="206" height="92" rx="10" fill="#102a33" stroke="#315868"/>
        <text x="30" y="472" fill="#e0f2fe" font-size="14" font-weight="800">本地模型</text>
        <text x="30" y="500" fill="#9fd6e5" font-size="13">Sherpa-ONNX CPU 默认稳定</text>
      </g>

      <g transform="translate(270 0)">
        <text x="0" y="34" fill="#ecfeff" font-size="30" font-weight="850">音频处理与波形剪辑</text>
        <text x="0" y="62" fill="#9fd6e5" font-size="15">转换、剪辑、合并和字幕片段导出集中在一个离线桌面应用中完成</text>

        <g transform="translate(0 88)">
          <rect width="236" height="72" rx="8" fill="#354146"/>
          <text x="18" y="31" fill="#f8fafc" font-size="16" font-weight="800">降噪/增强</text>
          <text x="18" y="55" fill="#b6d7df" font-size="13">标准化、滤波、降噪</text>
          <rect x="252" width="236" height="72" rx="8" fill="#354146"/>
          <text x="270" y="31" fill="#f8fafc" font-size="16" font-weight="800">格式转换</text>
          <text x="270" y="55" fill="#b6d7df" font-size="13">音频互转，视频提取音频</text>
          <rect x="504" width="236" height="72" rx="8" fill="#073f3c" stroke="#20d6c7" stroke-width="2"/>
          <text x="522" y="31" fill="#ecfeff" font-size="16" font-weight="850">音频剪辑</text>
          <text x="522" y="55" fill="#a7f3d0" font-size="13">波形预览，多段自由选择</text>
          <rect x="756" width="236" height="72" rx="8" fill="#354146"/>
          <text x="774" y="31" fill="#f8fafc" font-size="16" font-weight="800">音频合并</text>
          <text x="774" y="55" fill="#b6d7df" font-size="13">无重编码或重编码合并</text>
        </g>

        <g transform="translate(0 186)">
          <rect width="996" height="392" rx="12" fill="#102a33" stroke="#315868"/>
          <text x="22" y="34" fill="#bfdbfe" font-size="14" font-weight="800">帧率：25.000fps。未检测到视频帧率时回退 25fps。</text>

          <g transform="translate(22 56)">
            <rect width="760" height="170" rx="8" fill="#1f2727" stroke="#42626d"/>
            <g clip-path="url(#wave-clip)" fill="#f8fafc" opacity="0.94">
              <path d="M0 86 C10 38 18 132 28 77 C37 18 47 154 56 83 C68 30 76 139 90 76 C104 20 112 158 126 88 C140 42 148 124 160 82 C174 22 184 150 196 78 C208 48 218 116 232 88 C246 36 258 140 270 82 C286 18 300 160 314 78 C328 44 340 126 354 84 C370 28 384 148 398 82 C412 52 426 112 440 86 C454 38 468 132 482 78 C496 26 510 150 524 83 C538 42 552 118 566 86 C580 24 594 154 610 80 C626 40 640 124 656 84 C672 18 688 158 704 82 C720 46 738 122 760 86 L760 170 L0 170 Z"/>
              <path d="M0 86 C12 120 22 54 34 91 C48 142 60 36 72 88 C88 132 100 50 114 92 C130 140 144 32 158 86 C174 126 190 56 206 90 C222 136 238 38 254 88 C270 130 288 52 304 92 C320 142 338 30 354 86 C370 128 388 60 404 90 C420 132 438 48 454 88 C470 138 488 34 506 90 C522 128 540 58 558 88 C574 134 592 40 610 90 C626 124 646 54 664 88 C682 138 702 36 720 90 C736 120 748 62 760 86 L760 0 L0 0 Z"/>
            </g>
            <rect x="168" y="0" width="132" height="170" fill="#2dd4bf" opacity="0.34" stroke="#2dd4bf"/>
            <circle cx="176" cy="22" r="13" fill="#2dd4bf"/>
            <text x="172" y="27" fill="#08333a" font-size="13" font-weight="900">1</text>
            <rect x="354" y="0" width="196" height="170" fill="#8b5cf6" opacity="0.32" stroke="#8b5cf6"/>
            <circle cx="455" cy="22" r="13" fill="#8b5cf6"/>
            <text x="451" y="27" fill="#f5f3ff" font-size="13" font-weight="900">2</text>
            <rect x="590" y="0" width="150" height="170" fill="#f472b6" opacity="0.34" stroke="#f472b6"/>
            <circle cx="666" cy="22" r="13" fill="#f472b6"/>
            <text x="662" y="27" fill="#fff7ed" font-size="13" font-weight="900">3</text>
            <line x1="316" y1="0" x2="316" y2="170" stroke="#fb923c" stroke-width="3"/>
          </g>

          <g transform="translate(804 56)">
            <rect width="168" height="256" rx="8" fill="#0c1d24" stroke="#315868"/>
            <text x="14" y="28" fill="#e0f2fe" font-size="14" font-weight="850">片段列表</text>
            <g font-size="12">
              <rect x="12" y="48" width="144" height="46" rx="6" fill="#14303a" stroke="#2dd4bf"/>
              <text x="24" y="67" fill="#ecfeff" font-weight="800">1  00:12 - 00:36</text>
              <text x="24" y="86" fill="#9fd6e5">独立文件 / 合并导出</text>
              <rect x="12" y="106" width="144" height="46" rx="6" fill="#14303a"/>
              <text x="24" y="125" fill="#ecfeff" font-weight="800">2  01:08 - 01:42</text>
              <text x="24" y="144" fill="#9fd6e5">可调整顺序</text>
              <rect x="12" y="164" width="144" height="46" rx="6" fill="#14303a"/>
              <text x="24" y="183" fill="#ecfeff" font-weight="800">3  02:10 - 02:40</text>
              <text x="24" y="202" fill="#9fd6e5">Ctrl 拖动新增</text>
            </g>
          </g>

          <g transform="translate(22 250)">
            <rect width="122" height="40" rx="8" fill="url(#primary)"/>
            <text x="36" y="26" fill="#052e2b" font-size="14" font-weight="900">开始剪辑</text>
            <rect x="138" width="120" height="40" rx="8" fill="#122e38" stroke="#42626d"/>
            <text x="168" y="26" fill="#e0f2fe" font-size="14" font-weight="800">新增选区</text>
            <rect x="274" width="120" height="40" rx="8" fill="#122e38" stroke="#42626d"/>
            <text x="304" y="26" fill="#e0f2fe" font-size="14" font-weight="800">播放选区</text>
          </g>

          <g transform="translate(22 316)" font-size="13" font-weight="800">
            <rect width="952" height="54" rx="8" fill="#0d222b" stroke="#315868"/>
            <text x="16" y="34" fill="#9fd6e5">输出格式：WAV / MP3 / M4A / FLAC / OGG</text>
            <text x="342" y="34" fill="#9fd6e5">输出路径：源文件目录或自定义目录</text>
            <text x="704" y="34" fill="#9fd6e5">处理完成后一键打开目录</text>
          </g>
        </g>

        <g transform="translate(0 602)">
          <rect width="996" height="56" rx="10" fill="#0b3a38" stroke="#20d6c7"/>
          <text x="20" y="35" fill="#ecfeff" font-size="17" font-weight="850">1.0.2：修复入点设置、长文本上屏；支持时间格式输入和云端自动发布流程</text>
        </g>
      </g>
    </g>
  </g>
</svg>
