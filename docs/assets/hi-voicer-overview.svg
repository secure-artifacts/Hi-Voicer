<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">Hi-Voicer 0.2.2 product overview</title>
  <desc id="desc">A product overview image showing Hi-Voicer voice input, transcription, subtitle editing, audio processing, and local model workflow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#12233b"/>
      <stop offset="1" stop-color="#172033"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4ade80"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1440" height="820" fill="url(#bg)"/>
  <circle cx="1230" cy="110" r="170" fill="#38bdf8" opacity="0.11"/>
  <circle cx="140" cy="700" r="220" fill="#4ade80" opacity="0.08"/>

  <g transform="translate(92 76)">
    <rect x="0" y="0" width="1256" height="668" rx="24" fill="#ffffff" opacity="0.96" filter="url(#shadow)"/>
    <rect x="0" y="0" width="1256" height="74" rx="24" fill="#101827"/>
    <rect x="0" y="50" width="1256" height="24" fill="#101827"/>
    <circle cx="32" cy="36" r="8" fill="#ef4444"/>
    <circle cx="58" cy="36" r="8" fill="#f59e0b"/>
    <circle cx="84" cy="36" r="8" fill="#22c55e"/>
    <text x="118" y="44" fill="#f8fafc" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="700">Hi-Voicer</text>
    <text x="268" y="44" fill="#94a3b8" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="15">本地离线语音工作台</text>

    <g transform="translate(0 74)">
      <rect width="214" height="594" fill="#111827"/>
      <g font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="600">
        <rect x="20" y="28" width="174" height="44" rx="10" fill="#1f2937"/>
        <text x="58" y="56" fill="#f8fafc">首页</text>
        <text x="58" y="112" fill="#cbd5e1">转录</text>
        <text x="58" y="168" fill="#cbd5e1">字幕</text>
        <text x="58" y="224" fill="#cbd5e1">术语</text>
        <text x="58" y="280" fill="#cbd5e1">音频</text>
        <text x="58" y="336" fill="#cbd5e1">诊断</text>
      </g>
      <g fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round">
        <path d="M34 50h10m-5-5v10"/>
        <path d="M34 106h10m-10 6h10"/>
        <path d="M34 160h12m-12 8h12"/>
        <path d="M34 216h12m-12 8h8"/>
        <path d="M34 274c4-8 8 8 12 0"/>
        <path d="M34 330h12m-6-6v12"/>
      </g>
    </g>

    <g transform="translate(248 112)" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif">
      <text x="0" y="0" fill="#0f172a" font-size="36" font-weight="800">中文语音输入与文件转录</text>
      <text x="0" y="34" fill="#475569" font-size="18">录音、转写、字幕、术语和音频处理都在本机完成</text>

      <g transform="translate(0 78)">
        <rect width="510" height="218" rx="18" fill="url(#panel)" stroke="#cbd5e1"/>
        <text x="28" y="42" fill="#0f172a" font-size="24" font-weight="800">按住说话，自动上屏</text>
        <text x="28" y="75" fill="#475569" font-size="16">在任意输入框按快捷键录音，识别后自动粘贴。</text>
        <rect x="28" y="112" width="182" height="48" rx="12" fill="url(#accent)"/>
        <text x="62" y="143" fill="#052e16" font-size="17" font-weight="800">开始录音</text>
        <g transform="translate(248 112)" fill="#38bdf8">
          <rect x="0" y="26" width="10" height="32" rx="5"/>
          <rect x="22" y="12" width="10" height="60" rx="5"/>
          <rect x="44" y="0" width="10" height="84" rx="5"/>
          <rect x="66" y="18" width="10" height="48" rx="5"/>
          <rect x="88" y="34" width="10" height="24" rx="5"/>
        </g>
        <text x="28" y="188" fill="#64748b" font-size="14">支持按住说话、连续识别、纯录音三种模式</text>
      </g>

      <g transform="translate(546 78)">
        <rect width="360" height="218" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
        <text x="24" y="42" fill="#0f172a" font-size="22" font-weight="800">本地模型</text>
        <text x="24" y="74" fill="#475569" font-size="15">Sherpa-ONNX / SenseVoice</text>
        <text x="24" y="102" fill="#475569" font-size="15">无需把录音上传到云端</text>
        <g transform="translate(24 132)">
          <rect width="312" height="12" rx="6" fill="#dbeafe"/>
          <rect width="230" height="12" rx="6" fill="#38bdf8"/>
          <text x="0" y="48" fill="#64748b" font-size="14">模型、缓存、录音都保存在本机数据目录</text>
        </g>
      </g>

      <g transform="translate(0 330)">
        <rect width="286" height="166" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
        <text x="22" y="40" fill="#0f172a" font-size="21" font-weight="800">批量转录</text>
        <text x="22" y="72" fill="#475569" font-size="15">音频/视频文件转文字</text>
        <text x="22" y="100" fill="#64748b" font-size="14">TXT / 时间线 TXT / SRT</text>
        <rect x="22" y="124" width="130" height="12" rx="6" fill="#22c55e"/>
      </g>
      <g transform="translate(310 330)">
        <rect width="286" height="166" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
        <text x="22" y="40" fill="#0f172a" font-size="21" font-weight="800">字幕编辑</text>
        <text x="22" y="72" fill="#475569" font-size="15">校正文本、拆分合并</text>
        <text x="22" y="100" fill="#64748b" font-size="14">导出选中片段音频</text>
        <rect x="22" y="124" width="168" height="12" rx="6" fill="#38bdf8"/>
      </g>
      <g transform="translate(620 330)">
        <rect width="286" height="166" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
        <text x="22" y="40" fill="#0f172a" font-size="21" font-weight="800">音频处理</text>
        <text x="22" y="72" fill="#475569" font-size="15">标准化、裁静音、滤波</text>
        <text x="22" y="100" fill="#64748b" font-size="14">为转写和归档做准备</text>
        <rect x="22" y="124" width="146" height="12" rx="6" fill="#a78bfa"/>
      </g>

      <g transform="translate(0 532)">
        <rect width="906" height="54" rx="14" fill="#ecfeff" stroke="#bae6fd"/>
        <text x="24" y="35" fill="#075985" font-size="17" font-weight="700">0.2.2：增强字幕片段导出、音频预处理、诊断和发布校验流程</text>
      </g>
    </g>
  </g>
</svg>
